kind = "web"
previewPath = "/"
title = "FOQA Dashboard G3X"
version = "1.0.0"
id = "artifacts/foqa-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24154

[services.development]
run = "pnpm --filter @workspace/foqa-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/foqa-dashboard", "run", "build" ]
publicDir = "artifacts/foqa-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24154"
BASE_PATH = "/"
